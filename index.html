<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hydra Luxury Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              luxury: {
                bg: "#080808",
                surface: "#121212",
              },
              gold: {
                400: "#e8c547",
                500: "#d4af37",
                600: "#b8942e",
              },
            },
            fontFamily: {
              script: ["Great Vibes", "cursive"],
              body: ["Inter", "sans-serif"],
            },
            boxShadow: {
              soft: "0 8px 32px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.35)",
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .upload-zone.drag-over {
        border-color: #d4af37;
        background-color: rgba(212, 175, 55, 0.06);
      }

      .side-photo {
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
      }

      .medium-dropdown-trigger {
        background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
        box-shadow:
          inset 0 1px 0 rgba(212, 175, 55, 0.08),
          0 4px 16px rgba(0, 0, 0, 0.6);
      }

      .medium-dropdown-trigger:hover,
      .medium-dropdown-trigger[aria-expanded="true"] {
        border-color: #d4af37;
        box-shadow:
          inset 0 1px 0 rgba(212, 175, 55, 0.12),
          0 0 0 1px rgba(212, 175, 55, 0.15),
          0 6px 20px rgba(0, 0, 0, 0.65);
      }

      .medium-dropdown-menu {
        background: linear-gradient(180deg, #0c0c0c 0%, #050505 100%);
        box-shadow:
          0 12px 40px rgba(0, 0, 0, 0.75),
          0 0 0 1px rgba(212, 175, 55, 0.2),
          inset 0 1px 0 rgba(212, 175, 55, 0.06);
      }

      .medium-option {
        color: rgba(255, 255, 255, 0.75);
      }

      .medium-option:hover,
      .medium-option.selected {
        background: rgba(212, 175, 55, 0.1);
        color: #e8c547;
      }
    </style>
  </head>
  <body class="h-full bg-luxury-bg font-body text-white antialiased">
    <div class="flex h-full flex-col items-center justify-center px-4 py-6 sm:px-8">
      <!-- Title -->
      <h1
        class="font-script mb-6 shrink-0 text-center text-5xl leading-none text-gold-400 sm:mb-8 sm:text-6xl md:text-7xl"
      >
        Hydra Luxury Studio
      </h1>

      <!-- Main row: side photos + center upload -->
      <div class="flex w-full max-w-5xl flex-1 items-center justify-center gap-4 sm:gap-6 md:gap-10">
        <!-- Left: portrait placeholders -->
        <div class="hidden w-[88px] shrink-0 flex-col gap-3 sm:flex md:w-[108px] lg:w-[120px]">
          <img
            src="https://picsum.photos/seed/portrait1/240/320"
            alt="Portrait placeholder"
            width="240"
            height="320"
            class="side-photo aspect-[3/4] w-full rounded-lg object-cover ring-1 ring-gold-500/30"
          />
          <img
            src="https://picsum.photos/seed/portrait2/240/320"
            alt="Portrait placeholder"
            width="240"
            height="320"
            class="side-photo aspect-[3/4] w-full rounded-lg object-cover ring-1 ring-gold-500/30"
          />
        </div>

        <!-- Center column -->
        <div class="flex shrink-0 flex-col items-center">
          <!-- Upload zone (portrait, taller than wide) -->
          <label
            id="upload-zone"
            for="file-input"
            class="upload-zone group relative flex h-[min(52vh,420px)] w-[min(38vw,280px)] cursor-pointer flex-col items-center justify-center overflow-hidden rounded-xl border-2 border-dashed border-gold-500/55 bg-luxury-surface/60 transition-all duration-300 hover:border-gold-500 hover:bg-luxury-surface/90"
          >
            <input id="file-input" type="file" accept="image/*" class="sr-only" />

            <!-- Default state -->
            <div id="upload-prompt" class="flex flex-col items-center px-5 text-center">
              <svg
                class="mb-4 h-9 w-9 text-gold-500/55 transition-colors group-hover:text-gold-500"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.5"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"
                />
              </svg>
              <p class="text-xs leading-relaxed text-white/65 transition-colors group-hover:text-white/85 sm:text-sm">
                Drop your photo here or click to upload.
              </p>
            </div>

            <!-- Preview -->
            <img
              id="preview-image"
              src=""
              alt="Uploaded preview"
              class="absolute inset-0 hidden h-full w-full object-cover"
            />
          </label>

          <!-- Controls -->
          <div class="mt-4 flex w-[min(38vw,280px)] gap-3">
            <button
              id="upscale-btn"
              type="button"
              class="flex-1 rounded-lg border border-gold-500/45 bg-luxury-surface/80 px-4 py-2.5 text-xs font-medium tracking-widest text-gold-400 uppercase transition-all duration-300 hover:border-gold-500 hover:bg-gold-500/10 sm:text-sm"
            >
              Upscale
            </button>

            <div id="medium-dropdown" class="relative flex-1">
              <button
                id="medium-trigger"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
                class="medium-dropdown-trigger flex w-full items-center justify-between rounded-lg border border-gold-500/50 px-4 py-2.5 text-xs font-medium tracking-widest text-gold-400 uppercase transition-all duration-300 focus:border-gold-500 focus:outline-none sm:text-sm"
              >
                <span id="medium-label">Pick Medium</span>
                <svg
                  id="medium-chevron"
                  class="h-4 w-4 shrink-0 text-gold-500/70 transition-transform duration-300"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                  aria-hidden="true"
                >
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
              </button>
              <ul
                id="medium-menu"
                role="listbox"
                class="medium-dropdown-menu absolute top-[calc(100%+6px)] left-0 z-20 hidden w-full overflow-hidden rounded-lg border border-gold-500/35 py-1"
              >
                <li>
                  <button
                    type="button"
                    role="option"
                    data-value="oil"
                    data-label="Oil Painting"
                    class="medium-option w-full px-4 py-2.5 text-left text-xs tracking-widest uppercase transition-colors duration-200 sm:text-sm"
                  >
                    Oil Painting
                  </button>
                </li>
                <li>
                  <button
                    type="button"
                    role="option"
                    data-value="watercolor"
                    data-label="Watercolor"
                    class="medium-option w-full px-4 py-2.5 text-left text-xs tracking-widest uppercase transition-colors duration-200 sm:text-sm"
                  >
                    Watercolor
                  </button>
                </li>
                <li>
                  <button
                    type="button"
                    role="option"
                    data-value="sketch"
                    data-label="Sketch"
                    class="medium-option w-full px-4 py-2.5 text-left text-xs tracking-widest uppercase transition-colors duration-200 sm:text-sm"
                  >
                    Sketch
                  </button>
                </li>
                <li>
                  <button
                    type="button"
                    role="option"
                    data-value="cinematic"
                    data-label="Cinematic"
                    class="medium-option w-full px-4 py-2.5 text-left text-xs tracking-widest uppercase transition-colors duration-200 sm:text-sm"
                  >
                    Cinematic
                  </button>
                </li>
              </ul>
            </div>
          </div>

          <!-- Reset (shown after upload) -->
          <button
            id="reset-btn"
            type="button"
            class="mt-3 hidden text-xs tracking-widest text-white/35 uppercase transition-colors hover:text-gold-400/70"
          >
            Upload Another
          </button>
        </div>

        <!-- Right: pet placeholders -->
        <div class="hidden w-[88px] shrink-0 flex-col gap-3 sm:flex md:w-[108px] lg:w-[120px]">
          <img
            src="https://picsum.photos/seed/pet1/240/320"
            alt="Pet placeholder"
            width="240"
            height="320"
            class="side-photo aspect-[3/4] w-full rounded-lg object-cover ring-1 ring-gold-500/30"
          />
          <img
            src="https://picsum.photos/seed/pet2/240/320"
            alt="Pet placeholder"
            width="240"
            height="320"
            class="side-photo aspect-[3/4] w-full rounded-lg object-cover ring-1 ring-gold-500/30"
          />
        </div>
      </div>
    </div>

    <script>
      const uploadZone = document.getElementById("upload-zone");
      const fileInput = document.getElementById("file-input");
      const uploadPrompt = document.getElementById("upload-prompt");
      const previewImage = document.getElementById("preview-image");
      const resetBtn = document.getElementById("reset-btn");
      const upscaleBtn = document.getElementById("upscale-btn");
      const mediumDropdown = document.getElementById("medium-dropdown");
      const mediumTrigger = document.getElementById("medium-trigger");
      const mediumMenu = document.getElementById("medium-menu");
      const mediumLabel = document.getElementById("medium-label");
      const mediumChevron = document.getElementById("medium-chevron");
      const mediumOptions = mediumMenu.querySelectorAll("[role='option']");

      let objectUrl = null;
      let selectedMedium = "";

      function showPreview(file) {
        if (!file || !file.type.startsWith("image/")) return;

        if (objectUrl) URL.revokeObjectURL(objectUrl);
        objectUrl = URL.createObjectURL(file);
        previewImage.src = objectUrl;
        previewImage.classList.remove("hidden");
        uploadPrompt.classList.add("hidden");
        resetBtn.classList.remove("hidden");
      }

      function reset() {
        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
          objectUrl = null;
        }
        previewImage.src = "";
        previewImage.classList.add("hidden");
        uploadPrompt.classList.remove("hidden");
        fileInput.value = "";
        resetBtn.classList.add("hidden");
        upscaleBtn.classList.remove("border-gold-500", "bg-gold-500/15");
        selectedMedium = "";
        mediumLabel.textContent = "Pick Medium";
        mediumOptions.forEach((opt) => opt.classList.remove("selected"));
        closeMediumMenu();
      }

      function closeMediumMenu() {
        mediumMenu.classList.add("hidden");
        mediumTrigger.setAttribute("aria-expanded", "false");
        mediumChevron.classList.remove("rotate-180");
      }

      function openMediumMenu() {
        mediumMenu.classList.remove("hidden");
        mediumTrigger.setAttribute("aria-expanded", "true");
        mediumChevron.classList.add("rotate-180");
      }

      mediumTrigger.addEventListener("click", () => {
        const isOpen = mediumTrigger.getAttribute("aria-expanded") === "true";
        if (isOpen) closeMediumMenu();
        else openMediumMenu();
      });

      mediumOptions.forEach((option) => {
        option.addEventListener("click", () => {
          selectedMedium = option.dataset.value;
          mediumLabel.textContent = option.dataset.label;
          mediumOptions.forEach((opt) => opt.classList.remove("selected"));
          option.classList.add("selected");
          closeMediumMenu();
        });
      });

      document.addEventListener("click", (e) => {
        if (!mediumDropdown.contains(e.target)) closeMediumMenu();
      });

      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) showPreview(file);
      });

      uploadZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadZone.classList.add("drag-over");
      });

      uploadZone.addEventListener("dragleave", () => {
        uploadZone.classList.remove("drag-over");
      });

      uploadZone.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadZone.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file) showPreview(file);
      });

      resetBtn.addEventListener("click", reset);

      upscaleBtn.addEventListener("click", () => {
        if (!previewImage.src) return;
        upscaleBtn.classList.toggle("border-gold-500");
        upscaleBtn.classList.toggle("bg-gold-500/15");
      });
    </script>
  </body>
</html>
