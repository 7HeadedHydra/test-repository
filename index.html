<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              luxury: {
                bg: "#0a0a0a",
                surface: "#141414",
                border: "#2a2a2a",
              },
              gold: {
                400: "#e8c547",
                500: "#d4af37",
                600: "#b8942e",
              },
            },
            fontFamily: {
              display: ["Cormorant Garamond", "serif"],
              body: ["Inter", "sans-serif"],
            },
            boxShadow: {
              soft: "0 8px 32px rgba(0, 0, 0, 0.45), 0 2px 8px rgba(0, 0, 0, 0.3)",
            },
          },
        },
      };
    </script>
    <style>
      .upload-zone.drag-over {
        border-color: #d4af37;
        background-color: rgba(212, 175, 55, 0.04);
      }
    </style>
  </head>
  <body class="min-h-screen bg-luxury-bg font-body text-white antialiased">
    <div class="flex min-h-screen flex-col items-center justify-center px-6 py-16">
      <header class="mb-12 text-center">
        <h1 class="font-display text-3xl font-medium tracking-wide text-white sm:text-4xl">
          Photo Upload
        </h1>
        <p class="mt-2 text-sm tracking-widest text-white/40 uppercase">
          Select or drop your image
        </p>
      </header>

      <div class="w-full max-w-lg">
        <!-- Upload area -->
        <label
          id="upload-zone"
          for="file-input"
          class="upload-zone group flex cursor-pointer flex-col items-center justify-center rounded-xl border-2 border-dashed border-gold-500/50 bg-luxury-surface/50 px-8 py-16 transition-all duration-300 hover:border-gold-500 hover:bg-luxury-surface/80"
        >
          <input
            id="file-input"
            type="file"
            accept="image/*"
            class="sr-only"
          />
          <svg
            class="mb-5 h-10 w-10 text-gold-500/60 transition-colors group-hover:text-gold-500"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"
            />
          </svg>
          <p class="text-center text-sm leading-relaxed text-white/70 transition-colors group-hover:text-white/90">
            Drop your photo here or click to upload.
          </p>
        </label>

        <!-- Preview -->
        <div id="preview-section" class="mt-8 hidden">
          <div
            class="overflow-hidden rounded-xl bg-luxury-surface shadow-soft ring-1 ring-white/5"
          >
            <img
              id="preview-image"
              src=""
              alt="Uploaded preview"
              class="block w-full object-cover"
            />
          </div>
          <div class="mt-5 text-center">
            <button
              id="reset-btn"
              type="button"
              class="inline-flex items-center gap-2 rounded-lg border border-gold-500/40 bg-transparent px-6 py-2.5 text-xs font-medium tracking-widest text-gold-400 uppercase transition-all duration-300 hover:border-gold-500 hover:bg-gold-500/10 hover:text-gold-400"
            >
              Upload Another
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const uploadZone = document.getElementById("upload-zone");
      const fileInput = document.getElementById("file-input");
      const previewSection = document.getElementById("preview-section");
      const previewImage = document.getElementById("preview-image");
      const resetBtn = document.getElementById("reset-btn");

      let objectUrl = null;

      function showPreview(file) {
        if (!file || !file.type.startsWith("image/")) return;

        if (objectUrl) URL.revokeObjectURL(objectUrl);
        objectUrl = URL.createObjectURL(file);
        previewImage.src = objectUrl;
        previewSection.classList.remove("hidden");
      }

      function reset() {
        if (objectUrl) {
          URL.revokeObjectURL(objectUrl);
          objectUrl = null;
        }
        previewImage.src = "";
        fileInput.value = "";
        previewSection.classList.add("hidden");
      }

      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) showPreview(file);
      });

      uploadZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadZone.classList.add("drag-over");
      });

      uploadZone.addEventListener("dragleave", () => {
        uploadZone.classList.remove("drag-over");
      });

      uploadZone.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadZone.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file) showPreview(file);
      });

      resetBtn.addEventListener("click", reset);
    </script>
  </body>
</html>
